apiVersion: apps/v1
kind: Deployment
metadata:
  name: aqi-app-deployment
  labels:
    app: aqi-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aqi-app
  template:
    metadata:
      labels:
        app: aqi-app
    spec:
      containers:
      - name: aqi-app
        image: aqi-app:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: aqi-app-service
spec:
  type: NodePort
  selector:
    app: aqi-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080
